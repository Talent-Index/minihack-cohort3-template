name: Welcome new contributor

on:
  pull_request:
    types: [opened]

jobs:
  welcome:
    runs-on: ubuntu-latest
    steps:
      - name: Post welcome comment
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const pr = context.payload.pull_request;
            const sender = pr.user.login;
            const prNumber = pr.number;

            const allPRs = await github.rest.pulls.list({
              owner: owner,
              repo: repo,
              state: 'all',
              per_page: 100
            });

            const userPRs = allPRs.data.filter(function(p) {
              return p.user.login === sender;
            });

            var body;

            if (userPRs.length === 1) {
              body = "Hey @" + sender + ", your PR is in.\n\n"
                + "Before the reviewer picks this up, run through the checklist:\n\n"
                + "- Branch name follows `week-{N}-{your-github-handle}`\n"
                + "- PR title follows `[Cohort X Week N] Your Name - Deliverable title`\n"
                + "- Every section of the PR template is filled in\n"
                + "- `.env.example` is included, no real keys committed\n"
                + "- PR link posted in `#submissions` on Discord\n"
                + "- All weekly quests submitted on Plug and Play\n\n"
                + "If anything above is missing, update the PR before the Sunday midnight EAT deadline.\n\n"
                + "Resources while you wait for review:\n"
                + "- Developer handbook: [team1-kenya-mini-hack.vercel.app](https://team1-kenya-mini-hack.vercel.app)\n"
                + "- Fuji explorer: [testnet.snowtrace.io](https://testnet.snowtrace.io)\n"
                + "- Builders Hub: [core.app/builders-hub](https://core.app/builders-hub)\n"
                + "- Help: `#help` channel on Discord\n\n"
                + "Good work shipping.";
            } else {
              body = "PR received, @" + sender + ".\n\n"
                + "Checklist before review:\n"
                + "- [ ] Branch: `week-{N}-{your-github-handle}`\n"
                + "- [ ] Title: `[Cohort X Week N] Your Name - Deliverable title`\n"
                + "- [ ] PR template fully filled in\n"
                + "- [ ] `.env.example` included, no real keys committed\n"
                + "- [ ] PR link in `#submissions` on Discord\n"
                + "- [ ] Quests submitted on Plug and Play\n\n"
                + "Deadline: Sunday midnight EAT.";
            }

            await github.rest.issues.createComment({
              owner: owner,
              repo: repo,
              issue_number: prNumber,
              body: body
            });
